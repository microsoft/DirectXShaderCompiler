name: Build DXC with ASan and UBSan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Native Build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Sanitizer Environment
        shell: pwsh
        run: |
          # Query clang-cl directly for its resource directory
          $resource_dir = $(clang-cl --print-resource-dir).Trim()
          $sanitizer_lib_dir = Join-Path $resource_dir "lib\windows"
          
          if (Test-Path $sanitizer_lib_dir) {
            Write-Host "Found Clang Sanitizer libs at: $sanitizer_lib_dir"
            
            # 1. Add DLL location to PATH (so tools like llvm-tblgen can run during the build)
            echo "$sanitizer_lib_dir" >> $env:GITHUB_PATH
            
            # 2. Add LIB location to LIB env var (so lld-link can resolve the symbols)
            echo "LIB=$sanitizer_lib_dir;$env:LIB" >> $env:GITHUB_ENV

            # 3. Save this directory so we can bundle the DLL with our artifact later
            echo "ASAN_DLL_DIR=$sanitizer_lib_dir" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find Clang Sanitizer libs at $sanitizer_lib_dir!"
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build --fresh `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DCMAKE_C_FLAGS_RELEASE="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /O2 /DNDEBUG" `
            -DCMAKE_CXX_FLAGS_RELEASE="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /O2 /DNDEBUG" `
            -DCMAKE_EXE_LINKER_FLAGS_RELEASE="clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DCMAKE_SHARED_LINKER_FLAGS_RELEASE="clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Build DXC, DXCompiler, and DXIL Validator
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        # Added --target dxil
        run: cmake --build build --config Release --target dxcompiler --target dxc --target dxil --parallel 2

      - name: Bundle ASan DLL
        shell: pwsh
        run: |
          # Copy the ASan runtime DLL next to the compiled executables so they work on any PC
          Copy-Item -Path "$env:ASAN_DLL_DIR\clang_rt.asan_dynamic-x86_64.dll" -Destination "build\bin\"

      - name: Upload DXC Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized
          # Added build/bin/dxil.dll to the upload path
          path: |
            build/bin/dxcompiler.dll
            build/bin/dxc.exe
            build/bin/dxil.dll
            build/bin/clang_rt.asan_dynamic-x86_64.dll
          if-no-files-found: error
