name: Build DXC with ASan and UBSan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Native Build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Sanitizer Environment
        shell: pwsh
        run: |
          $vs_path = "C:\Program Files\Microsoft Visual Studio"
          
          # 1. Add DLL location to PATH (so tools like llvm-tblgen can run during the build)
          $asan_dll = Get-ChildItem -Path $vs_path -Filter "clang_rt.asan_dynamic-x86_64.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asan_dll) {
            $runtime_dir = $asan_dll.DirectoryName
            Write-Host "Found Sanitizer DLLs at: $runtime_dir"
            echo "$runtime_dir" >> $env:GITHUB_PATH
          } else {
            Write-Error "Could not find ASan DLL!"
            exit 1
          }
          
          # 2. Add LIB location to LIB env var (so lld-link can resolve the symbols)
          $asan_lib = Get-ChildItem -Path $vs_path -Filter "clang_rt.asan_dynamic-x86_64.lib" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asan_lib) {
            $lib_dir = $asan_lib.DirectoryName
            Write-Host "Found Sanitizer LIBs at: $lib_dir"
            echo "LIB=$lib_dir;$env:LIB" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find ASan LIB!"
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_USE_SANITIZER=Address `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DCMAKE_C_FLAGS="/w /MT -fsanitize=undefined -fsanitize-recover=undefined" `
            -DCMAKE_CXX_FLAGS="/w /MT -fsanitize=undefined -fsanitize-recover=undefined" `
            -DCMAKE_EXE_LINKER_FLAGS="/wholearchive:clang_rt.asan-x86_64.lib clang_rt.asan_cxx-x86_64.lib /wholearchive:clang_rt.ubsan_standalone-x86_64.lib clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DCMAKE_SHARED_LINKER_FLAGS="/wholearchive:clang_rt.asan-x86_64.lib clang_rt.asan_cxx-x86_64.lib /wholearchive:clang_rt.ubsan_standalone-x86_64.lib clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Build dxcompiler.dll
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        # Using parallel 2. ASan + UBSan linking is extremely memory intensive.
        run: cmake --build build --config Release --target dxcompiler --parallel 2

      - name: Upload DXC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized
          path: build/bin/dxcompiler.dll
          if-no-files-found: error
