name: Build DXC with ASan and UBSan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Native Build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Locate the Sanitizer runtimes provided by Visual Studio's Clang distribution
      # and add them to the PATH so that instrumented build tools can run.
      - name: Add Sanitizer Runtimes to PATH
        shell: pwsh
        run: |
          $vs_path = "C:\Program Files\Microsoft Visual Studio"
          $asan_dll = Get-ChildItem -Path $vs_path -Filter "clang_rt.asan_dynamic-x86_64.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($asan_dll) {
            $runtime_dir = $asan_dll.DirectoryName
            Write-Host "Found Sanitizer Runtimes at: $runtime_dir"
            
            # Add to GITHUB_PATH for subsequent steps
            echo "$runtime_dir" >> $env:GITHUB_PATH
            
            # Add to current session PATH so Configure can see it if it runs tests
            $env:PATH = "$runtime_dir;$env:PATH"
          } else {
            Write-Error "Could not find Clang Sanitizer runtime DLLs in $vs_path"
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_USE_SANITIZER="Address;Undefined" `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Build dxcompiler.dll
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        run: cmake --build build --config Release --target dxcompiler --parallel 2

      - name: Upload DXC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized
          path: build/bin/dxcompiler.dll
          if-no-files-found: error
