name: Build DXC with ASan and UBSan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Native Build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja and Latest LLVM
        run: |
          choco install ninja -y
          # Install the latest LLVM which has the patched Windows ASan interceptors
          choco install llvm -y
          
      # Add this step so CMake uses the newly installed LLVM instead of the older built-in one
      - name: Add LLVM to PATH
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup Sanitizer Environment
        shell: pwsh
        run: |
          $resource_dir = $(clang-cl --print-resource-dir).Trim()
          $sanitizer_lib_dir = Join-Path $resource_dir "lib\windows"
          
          if (Test-Path $sanitizer_lib_dir) {
            Write-Host "Found Clang Sanitizer libs at: $sanitizer_lib_dir"
            echo "$sanitizer_lib_dir" >> $env:GITHUB_PATH
            echo "LIB=$sanitizer_lib_dir;$env:LIB" >> $env:GITHUB_ENV
            echo "ASAN_DLL_DIR=$sanitizer_lib_dir" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find Clang Sanitizer libs at $sanitizer_lib_dir!"
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build --fresh `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DCMAKE_C_FLAGS_RELEASE="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /O2 /DNDEBUG" `
            -DCMAKE_CXX_FLAGS_RELEASE="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /O2 /DNDEBUG" `
            -DCMAKE_EXE_LINKER_FLAGS_RELEASE="clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DCMAKE_SHARED_LINKER_FLAGS_RELEASE="clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Build DXCompiler and DXC
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        # Removed the non-existent 'dxil' target
        run: cmake --build build --config Release --target dxcompiler --target dxc --parallel 2

      - name: Download Official DXIL.dll
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Fetching latest DXC release from GitHub to extract dxil.dll..."
          
          # Using GITHUB_TOKEN to prevent API Rate-Limiting issues on the runners
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match "dxc_.*\.zip" } | Select-Object -First 1
          
          if ($asset) {
            Write-Host "Downloading $($asset.name)..."
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "dxc_latest.zip"
            
            Write-Host "Extracting..."
            Expand-Archive -Path "dxc_latest.zip" -DestinationPath "dxc_latest" -Force
            
            Write-Host "Copying dxil.dll to build/bin..."
            Copy-Item -Path "dxc_latest\bin\x64\dxil.dll" -Destination "build\bin\" -Force
          } else {
            Write-Error "Could not find the DXC release zip!"
            exit 1
          }

      - name: Bundle ASan DLL
        shell: pwsh
        run: |
          Copy-Item -Path "$env:ASAN_DLL_DIR\clang_rt.asan_dynamic-x86_64.dll" -Destination "build\bin\"

      - name: Upload DXC Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized
          path: |
            build/bin/dxcompiler.dll
            build/bin/dxc.exe
            build/bin/dxil.dll
            build/bin/clang_rt.asan_dynamic-x86_64.dll
          if-no-files-found: error
