name: Build DXC with ASan and UBSan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Native Build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add Sanitizer Runtimes to PATH
        run: |
          # Find the directory containing clang-cl
          $clang_path = obj | where { $_.Name -eq "clang-cl.exe" } | Select-Object -First 1
          
          # Standard path for VS-bundled LLVM runtimes
          # We search for the asan dll and add its parent directory to GITHUB_PATH
          $runtime_dll = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Filter "clang_rt.asan_dynamic-x86_64.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($runtime_dll) {
            $runtime_dir = $runtime_dll.DirectoryName
            Write-Host "Found Sanitizer Runtimes at: $runtime_dir"
            echo "$runtime_dir" >> $env:GITHUB_PATH
            
            # Also set as environment variable for the current session just in case
            echo "PATH=$runtime_dir;$env:PATH" >> $env:GITHUB_ENV
          } else {
            Write-Error "Could not find Sanitizer runtime DLLs!"
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_USE_SANITIZER="Address;Undefined" `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DLLVM_PARALLEL_LINK_JOBS=1
 
      - name: Build dxcompiler.dll
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        # Reduced parallel to 2 to prevent RAM exhaustion. ASan links take ~3-4GB of RAM each.
        run: cmake --build build --config Release --target dxcompiler --parallel 2

      - name: Upload DXC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized
          path: build/bin/dxcompiler.dll
          if-no-files-found: error
